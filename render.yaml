# Render Blueprint: https://render.com/docs/blueprint-spec
# Deploy: Dashboard → New → Blueprint → connect this repo

databases:
  - name: embeddedgrid-db
    plan: free
    databaseName: embeddedgrid
    user: embeddedgrid

services:
  - type: web
    name: embeddedgrid
    runtime: python
    plan: free
    buildCommand: sed -i 's/\r$//' ./render-build.sh && bash ./render-build.sh
    startCommand: cd backend && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 180 --graceful-timeout 180
    healthCheckPath: /api/categories/
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: NODE_VERSION
        value: "20.18.0"
      - key: RENDER
        value: "true"
      - key: DEBUG
        value: "false"
      - key: SERVE_FRONTEND
        value: "true"
      - key: FRONTEND_DIST
        value: /opt/render/project/src/backend/frontend_dist
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: SEED_DEMO
        value: "true"
      - key: MODEL_3D_CONVERT_TIMEOUT
        value: "300"
      - key: DATABASE_URL
        fromDatabase:
          name: embeddedgrid-db
          property: connectionString
      # --- Payments — paste Stripe values in Render Dashboard → Environment ---
      - key: PUBLIC_SITE_URL
        value: https://embeddedgrid.onrender.com
      # When GeoIP is blocked, treat visitors as DZ so the store works in Algeria (optional safety net)
      - key: GEOIP_FALLBACK_COUNTRY
        value: DZ
      - key: PAYMENT_CURRENCY
        value: usd
      # Paste real values in Render Dashboard → Environment (placeholders show after blueprint sync)
      - key: STRIPE_SECRET_KEY
        value: "PASTE_sk_test_KEY_FROM_STRIPE"
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        value: "PASTE_whsec_FROM_STRIPE_WEBHOOKS"
        sync: false
      # Set false once Stripe keys above are filled in
      - key: PAYMENTS_AUTO_CONFIRM
        value: "false"
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        value: ""
        sync: false
      # Chargily Pay (Algeria — Edahabia / CIB). Webhook: /api/webhooks/chargily/
      - key: CHARGILY_PUBLIC_KEY
        value: "PASTE_test_or_live_pk_FROM_CHARGILY"
        sync: false
      - key: CHARGILY_SECRET_KEY
        value: "PASTE_test_or_live_sk_FROM_CHARGILY"
        sync: false
