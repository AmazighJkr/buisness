# Render Blueprint: https://render.com/docs/blueprint-spec
# Deploy: Dashboard → New → Blueprint → connect this repo

databases:
  - name: embeddedgrid-db
    plan: free
    databaseName: embeddedgrid
    user: embeddedgrid

services:
  - type: web
    name: embeddedgrid
    runtime: python
    plan: free
    buildCommand: sed -i 's/\r$//' ./render-build.sh && bash ./render-build.sh
    startCommand: cd backend && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /api/categories/
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: NODE_VERSION
        value: "20.18.0"
      - key: DEBUG
        value: "false"
      - key: SERVE_FRONTEND
        value: "true"
      - key: FRONTEND_DIST
        value: /opt/render/project/src/backend/frontend_dist
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: SEED_DEMO
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: embeddedgrid-db
          property: connectionString
