# Render Blueprint: https://render.com/docs/blueprint-spec
# Deploy: Dashboard → New → Blueprint → connect this repo

databases:
  - name: embeddedgrid-db
    plan: free
    databaseName: embeddedgrid
    user: embeddedgrid

services:
  - type: web
    name: embeddedgrid
    runtime: python
    plan: free
    buildCommand: sed -i 's/\r$//' ./render-build.sh && bash ./render-build.sh
    startCommand: cd backend && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /api/categories/
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: NODE_VERSION
        value: "20.18.0"
      - key: RENDER
        value: "true"
      - key: DEBUG
        value: "false"
      - key: SERVE_FRONTEND
        value: "true"
      - key: FRONTEND_DIST
        value: /opt/render/project/src/backend/frontend_dist
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: SEED_DEMO
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: embeddedgrid-db
          property: connectionString
      # --- Payments — paste Stripe values in Render Dashboard → Environment ---
      - key: PUBLIC_SITE_URL
        value: https://embeddedgrid.onrender.com
      - key: PAYMENT_CURRENCY
        value: usd
      # Leave empty until Stripe is set up; sync:false keeps your values on redeploy
      - key: STRIPE_SECRET_KEY
        value: ""
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        value: ""
        sync: false
      # false = real Stripe checkout when keys above are set; true = instant “paid” without Stripe
      - key: PAYMENTS_AUTO_CONFIRM
        value: "true"
        sync: false
